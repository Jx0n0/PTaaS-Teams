version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ptaas
      POSTGRES_USER: ptaas
      POSTGRES_PASSWORD: ptaas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ptaas
      POSTGRES_USER: ptaas
      POSTGRES_PASSWORD: ptaas
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: 1
      DJANGO_SECRET_KEY: dev-secret-key
    depends_on:
      - db

volumes:
  postgres_data:
